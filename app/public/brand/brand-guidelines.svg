  <text x="40" y="194"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="10" fill="#9CA3AF">Light / For white backgrounds</text>

  <!-- Full logo dark — preview box -->
  <rect x="290" y="108" width="220" height="68" rx="8" fill="#111111"/>
  <g transform="translate(302,115) scale(0.885)">
    <path d="M 28,4 C 42,4 42,26 21,26 C 0,26 0,48 14,48"
