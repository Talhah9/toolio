  <rect x="664" y="306" width="140" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="674" y="328"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="500" font-size="10" fill="#9CA3AF">BASE</text>
  <text x="674" y="348"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
