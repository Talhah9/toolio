    <circle cx="28" cy="4" r="5" fill="#fad02c"/>
    <circle cx="14" cy="48" r="5" fill="#818CF8"/>
  </g>
  <text x="354" y="153"
        font-family="'Syne','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="26" fill="#FFFFFF" letter-spacing="-0.5">Savvly.</text>
  <text x="290" y="194"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="10" fill="#9CA3AF">Dark / For dark backgrounds</text>

