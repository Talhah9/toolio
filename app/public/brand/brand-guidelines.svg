  <!-- Body font sample -->
  <rect x="460" y="442" width="400" height="72" rx="8" fill="#F8F8FA"/>
  <text x="478" y="468"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="9" fill="#9CA3AF" letter-spacing="1.5">BODY — DM SANS 400</text>
  <text x="478" y="490"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="400" font-size="14" fill="#374151" xml:space="preserve">Contracts, quotes, LinkedIn posts, legal docs —</text>
  <text x="478" y="508"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="400" font-size="14" fill="#374151">generated in seconds by AI.</text>

  <!-- ── SECTION 4: DO'S AND DON'TS ─────────────────────────── -->
