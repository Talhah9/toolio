  <text x="458" y="584"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="500" font-size="10" fill="#BE123C" letter-spacing="1">DON'T</text>
  <text x="458" y="604"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#9F1239">✗  Distort, rotate, or recolor the S emblem</text>
  <text x="458" y="622"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#9F1239">✗  Place on busy or low-contrast backgrounds</text>
  <text x="458" y="639"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#9F1239">✗  Use outline or thin-weight variations</text>

  <!-- ── FOOTER ──────────────────────────────────────────────── -->
  <rect x="0" y="656" width="900" height="44" fill="#111111"/>
  <text x="40" y="683"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="11" fill="rgba(255,255,255,0.35)">© 2025 Savvly · One platform, every tool for your success.</text>
  <text x="860" y="683"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="end">Version 1.0</text>
</svg>
