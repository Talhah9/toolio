<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Purple glow blob top-left -->
  <ellipse cx="200" cy="160" rx="320" ry="280" fill="#4F46E5" opacity="0.08"/>
  <!-- Gold glow blob bottom-right -->
  <ellipse cx="1050" cy="500" rx="280" ry="220" fill="#fad02c" opacity="0.06"/>

  <!-- Logo mark: purple circle + T -->
  <circle cx="556" cy="220" r="36" fill="#4F46E5"/>
  <text x="556" y="232" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="32" font-weight="700" fill="#ffffff" text-anchor="middle">T</text>

  <!-- Wordmark: Toolio -->
  <text x="608" y="235" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="40" font-weight="600" fill="#ffffff" letter-spacing="-1">oolio</text>

  <!-- Gold dot after logo -->
  <circle cx="770" cy="218" r="5" fill="#fad02c"/>

  <!-- Tagline -->
  <text x="600" y="320" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="28" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.9">Every tool a freelance needs.</text>
  <text x="600" y="360" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="28" font-weight="400" fill="#4F46E5" text-anchor="middle">Powered by AI.</text>

  <!-- Subtle divider -->
  <rect x="480" y="400" width="240" height="1" fill="#ffffff" opacity="0.1"/>

  <!-- Sub-tagline -->
  <text x="600" y="435" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="17" font-weight="400" fill="#ffffff" text-anchor="middle" opacity="0.4">Contracts · Quotes · LinkedIn · Legal docs · and more</text>

  <!-- URL badge -->
  <rect x="482" y="470" width="236" height="32" rx="16" fill="#ffffff" opacity="0.06"/>
  <text x="600" y="491" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="13" font-weight="500" fill="#ffffff" text-anchor="middle" opacity="0.5">app-alpha-rose-89.vercel.app</text>
</svg>
