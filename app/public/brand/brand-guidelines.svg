<svg width="900" height="700" viewBox="0 0 900 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style><![CDATA[@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap');]]></style>
  </defs>

  <!-- Page background -->
  <rect width="900" height="700" fill="#FAFAFA"/>

  <!-- ── HEADER ──────────────────────────────────────────────── -->
  <rect width="900" height="68" fill="#111111"/>
  <!-- Mini S emblem in header -->
  <g transform="translate(32,13) scale(0.808)">
    <path d="M 28,4 C 42,4 42,26 21,26 C 0,26 0,48 14,48"
          stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="28" cy="4" r="5" fill="#fad02c"/>
    <circle cx="14" cy="48" r="5" fill="#818CF8"/>
  </g>
  <text x="72" y="35"
        font-family="'Syne','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="22" fill="#FFFFFF" letter-spacing="-0.3">Savvly.</text>
  <text x="72" y="55"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="400" font-size="11" fill="rgba(255,255,255,0.45)" letter-spacing="2.5">BRAND GUIDELINES 2025</text>
  <text x="868" y="44"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-weight="400" font-size="11" fill="rgba(255,255,255,0.35)"
