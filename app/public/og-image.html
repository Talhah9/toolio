<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://rsms.me/inter/inter.css');
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0A0A0A;
      font-family: 'Inter var', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
    }
    .blob-purple {
      width: 600px; height: 500px;
      background: rgba(79, 70, 229, 0.18);
      top: -180px; left: -120px;
    }
    .blob-gold {
      width: 500px; height: 400px;
      background: rgba(250, 208, 44, 0.10);
      bottom: -140px; right: -80px;
    }

    /* Grid texture */
    .grid {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0;
    }

    /* Logo row */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }
    .logo-mark {
      width: 56px; height: 56px;
      background: #4F46E5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff;
      letter-spacing: -1px;
    }
    .logo-word {
      font-size: 48px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -2px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      background: #fad02c;
      border-radius: 50%;
      margin-left: 2px;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    /* Headline */
    .headline {
      font-size: 44px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -2px;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .headline-accent {
      color: #4F46E5;
    }

    /* Divider */
    .divider {
      width: 80px; height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 1px;
      margin: 28px auto;
    }

    /* Tool tags */
    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 700px;
    }
    .tag {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 15px;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
    }

    /* URL */
    .url {
      margin-top: 36px;
      font-size: 15px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="blob blob-purple"></div>
  <div class="blob blob-gold"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="logo-row">
      <div class="logo-mark">T</div>
      <div style="display:flex;align-items:baseline;gap:0">
        <span class="logo-word">oolio</span>
        <div class="logo-dot"></div>
      </div>
    </div>

    <div class="headline">
      Every tool a freelance needs.<br>
      <span class="headline-accent">Powered by AI.</span>
    </div>

    <div class="divider"></div>

    <div class="tags">
      <span class="tag">Contracts</span>
      <span class="tag">Quotes</span>
      <span class="tag">LinkedIn Posts</span>
      <span class="tag">Legal Docs</span>
      <span class="tag">Competitor Analysis</span>
      <span class="tag">+ more</span>
    </div>

    <div class="url">app-alpha-rose-89.vercel.app</div>
  </div>
</body>
</html>
