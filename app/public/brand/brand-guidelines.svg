        font-weight="500" font-size="10" fill="#15803D" letter-spacing="1">DO</text>
  <!-- Check marks using path shapes -->
  <text x="58" y="604"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#166534">✓  Use on white, cream, or #111 backgrounds</text>
  <text x="58" y="622"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#166534">✓  Maintain clear space equal to emblem height</text>
  <text x="58" y="639"
        font-family="'DM Sans','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#166534">✓  Use the purple icon on purple brand backgrounds</text>

  <!-- Don'ts column -->
