  <rect x="548" y="108" width="68" height="68" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <g transform="translate(566,117) scale(0.808)">
    <path d="M 28,4 C 42,4 42,26 21,26 C 0,26 0,48 14,48"
          stroke="#111111" stroke-width="5" stroke-linecap="round" fill="none"/>
    <circle cx="28" cy="4" r="5" fill="#fad02c"/>
    <circle cx="14" cy="48" r="5" fill="#4F46E5"/>
  </g>

  <!-- Icon dark -->
  <rect x="628" y="108" width="68" height="68" rx="14" fill="#111111"/>
  <g transform="translate(646,117) scale(0.808)">
