  <!-- Full logo light — preview box -->
  <rect x="40" y="108" width="220" height="68" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <!-- Inline full light logo -->
  <g transform="translate(52,115) scale(0.885)">
    <path d="M 28,4 C 42,4 42,26 21,26 C 0,26 0,48 14,48"
